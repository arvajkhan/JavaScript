<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentHub Navbar</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-xl custom-navbar sticky-top">
    <div class="container-fluid px-lg-5">
      <!-- Logo -->
      <a class="navbar-brand d-flex align-items-center" href="#">
        <span class="logo-icon">
          <i class="bi bi-mortarboard-fill"></i>
        </span>
        Student<span>Hub</span>
      </a>
      <!-- Mobile Toggle Button -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <i class="bi bi-list"></i>
      </button>
      <!-- Navbar Content -->
      <div class="collapse navbar-collapse" id="mainNavbar">
        <!-- Nav Links -->
        <ul class="navbar-nav mx-auto align-items-xl-center">
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-house-door me-1"></i> Home
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-people me-1"></i> Students
            </a>
          </li>
          <!-- Courses Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              <i class="bi bi-book me-1"></i> Courses
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">B.Tech CSE</a></li>
              <li><a class="dropdown-item" href="#">B.Tech ECE</a></li>
              <li><a class="dropdown-item" href="#">BCA</a></li>
              <li><a class="dropdown-item" href="#">MCA</a></li>
            </ul>
          </li>
          <!-- Resources Dropdown -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
              <i class="bi bi-grid me-1"></i> Resources
            </a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Notes</a></li>
              <li><a class="dropdown-item" href="#">Assignments</a></li>
              <li><a class="dropdown-item" href="#">Projects</a></li>
            </ul>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-info-circle me-1"></i> About
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-envelope me-1"></i> Contact
            </a>
          </li>
        </ul>
        <!-- Right Side -->
        <div class="d-xl-flex align-items-center gap-3">
          <!-- Search Bar -->
          <form class="search-box" id="searchForm">
            <input type="search" class="form-control" id="searchInput" placeholder="Search students...">
            <button class="search-btn" type="submit">
              <i class="bi bi-search"></i>
            </button>
          </form>
          <!-- Login Button -->
          <button class="login-btn">
            <i class="bi bi-person-circle me-1"></i> Login
          </button>
        </div>
      </div>
    </div>
  </nav>


  <div class="contain">
    <div class="row form">
      
    </div>
  </div>
  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JS -->
  <script src="script.js"></script>
</body>
</html>
