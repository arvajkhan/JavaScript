<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      display: grid;
      place-items: center;
      align-items: center;
    }

    .from {
      width: 400px;
      height: 800px;
      border: 2px solid black;
      border-radius: 10px;
      display: grid;
      align-items: center;
      place-items: center;
    }

    input {
      width: 380px;
      height: 30px;
      border-radius: 10px;
    }

    button {
      width: 388px;
      height: 30px;
      border-radius: 10px;
      background-color: skyblue;
    }
  </style>
</head>

<body>
  <!-- Splice(startIndex, deleteCount, item1, item2, ...) -->
  <div class="from">
    <h1>Array : Splice</h1>
    <h2 class="show"></h2>
    <input type="text" id="val">
    <input type="text" id="val1">
    <input type="text" id="name">
    <input type="text" id="name1">
    <button onclick="btn()">Search</button>
    <div class="result"></div>
  </div>
  <script>
    let show = document.querySelector(".show");
    let arr = ["Arvaj", "Shahil", "Rohit", "Mohit"]
    show.innerHTML = arr.join(" ")
    function btn() {
      let in1 = document.querySelector("#val").value;
      let in2 = document.querySelector("#val1").value;
      let name = document.querySelector("#name").value;
      let name1 = document.querySelector("#name1").value;
      let result = document.querySelector(".result");
      let ss = arr.splice(in1, in2, name, name1)
      result.innerHTML = arr.join(" ")
    }
  </script>
</body>

</html>
