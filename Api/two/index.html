    <style>
        body{
            font-family: Arial;
            background:#f5f5f5;
            padding:20px;
           
        }

            margin:5px;

            border-radius:50%;

<input type="text" id="search" placeholder="Search">
<button onclick="searchStudent()">Search</button>
<div class="container" id="result"></div>
<script src="script.js"></script>
