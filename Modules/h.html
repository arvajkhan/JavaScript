<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .box{
            background:#0d6efd;
            color:white;
            padding:30px;
            text-align:center;
            border-radius:10px;
            margin-bottom:15px;
        }

        nav{
            background:#212529;
            color:white;
            padding:15px;
        }

        footer{
            background:#212529;
            color:white;
            text-align:center;
            padding:20px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="text-center">
        <h2>Responsive Website</h2>
    </nav>

    <!-- Hero -->
    <div class="container my-4">
        <div class="row">
            <div class="col-12">
                <div class="box">
                    Hero Section
                </div>
            </div>
        </div>

        <!-- Cards -->
        <div class="row">
            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="box">Card 1</div>
            </div>

            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="box">Card 2</div>
            </div>

            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="box">Card 3</div>
            </div>

            <div class="col-lg-3 col-md-6 col-sm-12">
                <div class="box">Card 4</div>
            </div>
        </div>

        <!-- Sidebar + Content -->
        <div class="row mt-3">
            <div class="col-lg-3">
                <div class="box">Sidebar</div>
            </div>

            <div class="col-lg-9">
                <div class="box">Main Content</div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        Copyright © 2026
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
