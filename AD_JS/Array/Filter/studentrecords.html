     body{

h1{

#val{

button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.card{
    text-align:center;
    padding:15px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);
    transition:.3s;
    height:100%;
    margin: 20px;
}


.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #0d6efd;
    margin:0 auto 10px;
}

.card p{
    margin:4px 0;
}

.form{

}

function search() {

    let val = document.querySelector("#val").value;

    let result = arr.filter(item => item.roll === val);

    let show = "";

    result.forEach(element => {
        show += `
        <div class="col-lg-3">
            <div class="card " style="height: 300px">
                <img src="${element.photo}">
                <p>Roll: ${element.roll}</p>
                <p>Name: ${element.name}</p>
                <p>Course: ${element.course}</p>
                <p>Address: ${element.address}</p>
            </div>
        </div>
        `;
    });

    student.innerHTML = show;
}
