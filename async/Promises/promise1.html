<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div class="result"></div>
  <script>
    let result = document.querySelector(".result");
    let ans = new Promise((res, rej) => {
      let n = Math.floor(Math.random() * 10);
      if (n < 5) {
        return res(n);
      } else {
        return rej(n);
      }
    })

    ans.
      then(function (n) {
        result.innerHTML = `Random Value: ${n}<br>Below 5`
      }).catch(function () {
        result.innerHTML = `Random Value: ${n}<br>Above or Equal to 5`
      })
  </script>
</body>

</html>
